name: Release GUI

on:
  push:
    branches: [main]
    paths:
      - 'gui/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux
            arch: amd64
            build_path: build/linux/x64/release/bundle
            artifact_name: vga-launcher-linux
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: linux
            arch: arm64
            build_path: build/linux/arm64/release/bundle
            artifact_name: vga-launcher-linux-arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (x86_64)
        if: matrix.arch == 'amd64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Flutter (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git curl
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Enable desktop support
        run: |
          flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: gui
        run: flutter pub get

      - name: Generate platform projects
        working-directory: gui
        run: flutter create --platforms=${{ matrix.target }} .

      - name: Build ${{ matrix.target }}
        working-directory: gui
        run: flutter build ${{ matrix.target }} --release

      - name: Prepare package with icon and desktop entry
        working-directory: gui
        run: |
          BUNDLE_DIR="${{ matrix.build_path }}"

          # Copy icon into bundle
          cp assets/icon.png "$BUNDLE_DIR/icon.png"

          # Create .desktop file (using echo to avoid YAML heredoc issues)
          echo '[Desktop Entry]' > "$BUNDLE_DIR/vga-launcher.desktop"
          echo 'Version=1.0' >> "$BUNDLE_DIR/vga-launcher.desktop"
          echo 'Name=Simple VGA Simulator' >> "$BUNDLE_DIR/vga-launcher.desktop"
          echo 'Comment=VGA Simulator Launcher for FPGA Development' >> "$BUNDLE_DIR/vga-launcher.desktop"
          echo 'Exec=@@EXEC_PATH@@' >> "$BUNDLE_DIR/vga-launcher.desktop"
          echo 'Icon=@@ICON_PATH@@' >> "$BUNDLE_DIR/vga-launcher.desktop"
          echo 'Type=Application' >> "$BUNDLE_DIR/vga-launcher.desktop"
          echo 'Terminal=false' >> "$BUNDLE_DIR/vga-launcher.desktop"
          echo 'Categories=Development;Electronics;' >> "$BUNDLE_DIR/vga-launcher.desktop"

          # Create install.sh (using echo to avoid YAML heredoc issues)
          echo '#!/bin/bash' > "$BUNDLE_DIR/install.sh"
          echo 'set -e' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo '# Resolve script directory, handling spaces correctly' >> "$BUNDLE_DIR/install.sh"
          echo 'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo 'INSTALL_DIR="$HOME/.local/share/vga-launcher"' >> "$BUNDLE_DIR/install.sh"
          echo 'ICON_DIR="$HOME/.local/share/icons"' >> "$BUNDLE_DIR/install.sh"
          echo 'DESKTOP_DIR="$HOME/.local/share/applications"' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo 'echo "Installing Simple VGA Simulator..."' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo 'mkdir -p "$INSTALL_DIR"' >> "$BUNDLE_DIR/install.sh"
          echo 'mkdir -p "$ICON_DIR"' >> "$BUNDLE_DIR/install.sh"
          echo 'mkdir -p "$DESKTOP_DIR"' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo '# Copy application files (exclude install.sh and .desktop template)' >> "$BUNDLE_DIR/install.sh"
          echo 'for f in "$SCRIPT_DIR"/*; do' >> "$BUNDLE_DIR/install.sh"
          echo '    fname=$(basename "$f")' >> "$BUNDLE_DIR/install.sh"
          echo '    if [ "$fname" != "install.sh" ] && [ "$fname" != "vga-launcher.desktop" ]; then' >> "$BUNDLE_DIR/install.sh"
          echo '        cp -r "$f" "$INSTALL_DIR/"' >> "$BUNDLE_DIR/install.sh"
          echo '    fi' >> "$BUNDLE_DIR/install.sh"
          echo 'done' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo '# Copy icon to standard icon location' >> "$BUNDLE_DIR/install.sh"
          echo 'cp "$SCRIPT_DIR/icon.png" "$ICON_DIR/vga-launcher.png"' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo '# Generate .desktop with absolute paths (quoted to handle spaces)' >> "$BUNDLE_DIR/install.sh"
          echo 'sed -e "s|@@EXEC_PATH@@|\"$INSTALL_DIR/vga_launcher\"|g" \' >> "$BUNDLE_DIR/install.sh"
          echo '    -e "s|@@ICON_PATH@@|vga-launcher|g" \' >> "$BUNDLE_DIR/install.sh"
          echo '    "$SCRIPT_DIR/vga-launcher.desktop" > "$DESKTOP_DIR/vga-launcher.desktop"' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo 'chmod +x "$DESKTOP_DIR/vga-launcher.desktop"' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo '# Update desktop database' >> "$BUNDLE_DIR/install.sh"
          echo 'if command -v update-desktop-database &> /dev/null; then' >> "$BUNDLE_DIR/install.sh"
          echo '    update-desktop-database "$DESKTOP_DIR" 2>/dev/null || true' >> "$BUNDLE_DIR/install.sh"
          echo 'fi' >> "$BUNDLE_DIR/install.sh"
          echo '' >> "$BUNDLE_DIR/install.sh"
          echo 'echo "Installation complete!"' >> "$BUNDLE_DIR/install.sh"
          echo 'echo "You can now launch Simple VGA Simulator from your applications menu."' >> "$BUNDLE_DIR/install.sh"
          echo 'echo "Or run directly: $INSTALL_DIR/vga_launcher"' >> "$BUNDLE_DIR/install.sh"

          chmod +x "$BUNDLE_DIR/install.sh"

      - name: Package (Linux)
        working-directory: gui
        run: tar czf ../${{ matrix.artifact_name }}.${{ matrix.archive_ext }} -C ${{ matrix.build_path }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from pubspec
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' gui/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}+build.${{ github.run_number }}
          name: VGA Launcher v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
