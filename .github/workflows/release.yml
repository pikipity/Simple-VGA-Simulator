name: Release GUI

on:
  push:
    branches: [main]
    paths:
      - 'gui/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux
            arch: amd64
            build_path: build/linux/x64/release/bundle
            artifact_name: vga-launcher-linux
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: linux
            arch: arm64
            build_path: build/linux/arm64/release/bundle
            artifact_name: vga-launcher-linux-arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (x86_64)
        if: matrix.arch == 'amd64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Flutter (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git curl
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Enable desktop support
        run: |
          flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: gui
        run: flutter pub get

      - name: Generate platform projects
        working-directory: gui
        run: flutter create --platforms=${{ matrix.target }} .

      - name: Build ${{ matrix.target }}
        working-directory: gui
        run: flutter build ${{ matrix.target }} --release

      - name: Prepare package with icon and desktop entry
        working-directory: gui
        run: |
          BUNDLE_DIR="${{ matrix.build_path }}"

          # Copy icon into bundle
          cp assets/icon.png "$BUNDLE_DIR/icon.png"

          # Create .desktop file with placeholders
          cat > "$BUNDLE_DIR/vga-launcher.desktop" << 'DESKTOP_EOF'
[Desktop Entry]
Version=1.0
Name=Simple VGA Simulator
Comment=VGA Simulator Launcher for FPGA Development
Exec=@@EXEC_PATH@@
Icon=@@ICON_PATH@@
Type=Application
Terminal=false
Categories=Development;Electronics;
DESKTOP_EOF

          # Create install.sh
          cat > "$BUNDLE_DIR/install.sh" << 'INSTALL_EOF'
#!/bin/bash
set -e

# Resolve script directory, handling spaces correctly
SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

INSTALL_DIR="$HOME/.local/share/vga-launcher"
ICON_DIR="$HOME/.local/share/icons"
DESKTOP_DIR="$HOME/.local/share/applications"

echo "Installing Simple VGA Simulator..."

mkdir -p "$INSTALL_DIR"
mkdir -p "$ICON_DIR"
mkdir -p "$DESKTOP_DIR"

# Copy application files (exclude install.sh and .desktop template)
for f in "$SCRIPT_DIR"/*; do
    fname=$(basename "$f")
    if [ "$fname" != "install.sh" ] && [ "$fname" != "vga-launcher.desktop" ]; then
        cp -r "$f" "$INSTALL_DIR/"
    fi
done

# Copy icon to standard icon location
cp "$SCRIPT_DIR/icon.png" "$ICON_DIR/vga-launcher.png"

# Generate .desktop with absolute paths (quoted to handle spaces)
sed -e "s|@@EXEC_PATH@@|\"$INSTALL_DIR/vga_launcher\"|g" \
    -e "s|@@ICON_PATH@@|vga-launcher|g" \
    "$SCRIPT_DIR/vga-launcher.desktop" > "$DESKTOP_DIR/vga-launcher.desktop"

chmod +x "$DESKTOP_DIR/vga-launcher.desktop"

# Update desktop database
if command -v update-desktop-database &> /dev/null; then
    update-desktop-database "$DESKTOP_DIR" 2>/dev/null || true
fi

echo "Installation complete!"
echo "You can now launch 'Simple VGA Simulator' from your applications menu."
echo "Or run directly: \"$INSTALL_DIR/vga_launcher\""
INSTALL_EOF

          chmod +x "$BUNDLE_DIR/install.sh"

      - name: Package (Linux)
        working-directory: gui
        run: tar czf ../${{ matrix.artifact_name }}.${{ matrix.archive_ext }} -C ${{ matrix.build_path }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from pubspec
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' gui/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}+build.${{ github.run_number }}
          name: VGA Launcher v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
